# Abyssos tmux status bar theme
# Source from your tmux.conf: source-file /path/to/abyssos.tmux.conf
# https://github.com/terry-li-hm/abyssos
#
# Colour map (256-colour, hex breaks mouse clicks in some terminals):
#   44  = #00d7d7  teal hero  (≈ Abyssos cyan #20C5C0)
#   234 = #1c1c1c  bg dark    (≈ Abyssos black #1A1C1E)
#   236 = #303030  bg mid     (≈ Abyssos bright-black #2A2C2E)
#   242 = #6c6c6c  dim grey   (busy/inactive text)
#   103 = #8787af  quiet grey (status text)

set -g status-style 'bg=default fg=colour103'
set -g status-right '#{?window_zoomed_flag,#[fg=colour44]Z ,}#[fg=colour103]#S '

# Idle (silent 30s) = teal — "done, needs you"
# Active (outputting) = dim grey — "busy, leave it alone"
setw -g window-status-format '#{?window_silence_flag,#[fg=colour44 bg=colour234],#[fg=colour242 bg=colour234]} #I #W #[default]'
setw -g window-status-current-format '#{?window_silence_flag,#[fg=colour44 bold bg=colour236],#[fg=colour44 bold bg=colour236]} #I #W #[default]'
setw -g window-status-separator ' '

set -g pane-border-style 'fg=colour234'
set -g pane-active-border-style 'fg=colour44'
